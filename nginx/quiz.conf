# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name quiz.zikkan.com;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name quiz.zikkan.com;
    
    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/quiz.zikkan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quiz.zikkan.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Increase max body size for uploads
    client_max_body_size 50M;
    
    # Proxy settings
    location / {
        proxy_pass http://quiz:3042;
        proxy_http_version 1.1;
        
        # WebSocket support (critical for real-time quiz features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

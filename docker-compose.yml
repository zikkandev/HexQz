services:
  quiz:
    build: .
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3042
      - DB_PATH=/app/data/hexqz.sqlite
    restart: unless-stopped
    networks:
      - quiz-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/quiz.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - quiz
    restart: unless-stopped
    networks:
      - quiz-network

  stress-test:
    build: ./stress-test
    networks:
      - quiz-network
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET}
      - AUTO_START=${AUTO_START:-false}
    profiles:
      - testing
    # Usage:
    #   Manual: docker compose --profile testing run --rm stress-test <joinCode> <numPlayers> http://nginx
    #   Auto:   docker compose --profile testing run --rm stress-test --auto <numPlayers> http://nginx
    #   Parallel: docker compose --profile testing run --rm stress-test node parallel-stress-test.js --auto-advance --base-url http://nginx

networks:
  quiz-network:
    driver: bridge
